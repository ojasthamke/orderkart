name: orderkart
description: "FreshFlow - Offline Order Management for delivery businesses. Manages areas, streets, customers, orders, inventory, expenses and analytics."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1

  # Database
  sqflite: ^2.3.3+1
  path: ^1.9.0
  path_provider: ^2.1.3

  # Networking / Sharing
  url_launcher: ^6.3.0
  share_plus: ^9.0.0

  # QR Code
  qr_flutter: ^4.1.0
  mobile_scanner: ^5.2.3

  # Charts
  fl_chart: ^0.69.0

  # PDF & Printing
  pdf: ^3.10.8
  printing: ^5.13.1

  # Localization & Formatting
  intl: ^0.19.0

  # ID Generation
  uuid: ^4.4.0

  # Image
  image_picker: ^1.1.2

  # Permissions
  permission_handler: ^11.3.1

  # Animations
  flutter_animate: ^4.5.0

  # Fonts
  google_fonts: ^6.2.1

  # File Export/Import
  csv: ^6.0.0
  file_picker: ^8.1.3

  # Preferences
  shared_preferences: ^2.3.1

  # Notifications
  flutter_local_notifications: ^17.2.2

  # Loading Shimmer
  shimmer: ^3.0.0

  # Cupertino Icons
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
