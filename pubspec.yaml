name: orderkart
description: "FreshFlow - Offline Order Management for delivery businesses. Manages areas, streets, customers, orders, inventory, expenses and analytics."
publish_to: 'none'
version: 1.0.1+5

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1

  # Database
  sqflite: ^2.3.3+1
  path: ^1.9.0
  path_provider: ^2.1.3

  # Networking / Sharing
  url_launcher: ^6.3.0
  share_plus: ^9.0.0
  connectivity_plus: ^6.0.3
  network_info_plus: ^6.0.0

  # QR Code
  qr_flutter: ^4.1.0
  mobile_scanner: ^5.2.3

  # Charts
  fl_chart: ^0.69.0


  # Localization & Formatting
  intl: ^0.19.0

  # ID Generation
  uuid: ^4.4.0

  # Image
  image_picker: ^1.1.2

  # Permissions
  permission_handler: ^11.3.1

  # Animations
  flutter_animate: ^4.5.0

  # Fonts
  google_fonts: ^6.2.1

  # File Export/Import
  csv: ^6.0.0
  file_picker: ^8.0.7
  archive: ^3.6.1

  # Preferences
  shared_preferences: ^2.3.1

  # Notifications
  flutter_local_notifications: ^17.2.2

  # Loading Shimmer
  shimmer: ^3.0.0

  # Cupertino Icons
  cupertino_icons: ^1.0.6
  timezone: ^0.9.4
  flutter_timezone: ^4.1.1
  encrypt: ^5.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_native_splash: ^2.4.1
  flutter_launcher_icons: ^0.14.1
  sqflite_common_ffi: ^2.3.4+4

flutter_native_splash:
  color: "#388E3C" # AppColors.primary (FreshFlow Green)
  android: true
  ios: false
  web: false

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#388E3C"
  adaptive_icon_foreground: "assets/icon.png"

flutter:
  uses-material-design: true

  assets:
    - assets/logo.png
    - assets/icon.png
    - assets/worker_sync_received.jpg
