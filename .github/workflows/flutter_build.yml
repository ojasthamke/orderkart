name: Flutter Build CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repository code
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Set up Java JDK 17 (required for Android builds)
      - name: Set up Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 3. Set up Flutter — latest stable
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      # 3.1 Accept Android Licenses
      - name: Accept Android Licenses
        run: |
          flutter config --no-analytics
          yes | flutter doctor --android-licenses || true

      # 4. Get all packages/dependencies
      - name: Install Dependencies
        run: flutter pub get

      # 4.1 Generate Launcher Icons and Splash Screens
      - name: Generate Native Assets
        run: |
          dart run flutter_launcher_icons
          dart run flutter_native_splash:create

      # 5. Analyze Dart code (non-blocking)
      - name: Analyze Code
        run: flutter analyze --no-fatal-infos || true

      # 6. Build Android Release APK — capture full Gradle output for debugging
      - name: Build Android APK
        run: |
          flutter build apk --release --no-tree-shake-icons 2>&1 | tee /tmp/flutter_build.log
          BUILD_EXIT=${PIPESTATUS[0]}
          if [ "$BUILD_EXIT" -ne 0 ]; then
            echo "=== GRADLE ERROR OUTPUT ==="
            grep -A 30 'FAILURE\|error:\|Exception\|BUILD FAILED' /tmp/flutter_build.log | head -100
            exit $BUILD_EXIT
          fi

      # 7. Upload APK Artifact
      - name: Upload Android APK Release
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk

  build-ios:
    name: Build iOS IPA
    runs-on: macos-latest

    steps:
      # 1. Checkout repository code
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Set up Flutter — latest stable
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      # 3. Get all packages/dependencies
      - name: Install Dependencies
        run: flutter pub get

      # 4. Generate Launcher Icons and Splash Screens
      - name: Generate Native Assets
        run: |
          dart run flutter_launcher_icons
          dart run flutter_native_splash:create

      # 5. Build iOS Release Application without codesigning
      - name: Build iOS IPA (No Codesign)
        run: |
          flutter build ipa --no-codesign --release

      # 6. Upload iOS Build Archive/IPA Artifact
      - name: Upload iOS Release Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-ipa
          path: build/ios/archive/Runner.xcarchive
